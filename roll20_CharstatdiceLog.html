
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f5f5; }
  #app { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 1.25rem; background: #f0f0f0; }

  .outer-card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 12px;
    padding: 1.25rem;
    max-width: 660px;
    margin: 0 auto;
  }

  h1 { font-size: 15px; font-weight: 700; color: #222; margin-bottom: 3px; }
  .subtitle { font-size: 11px; color: #888; margin-bottom: 12px; }

  .guide {
    background: #f9f9f9;
    border: 1px solid #e8e8e8;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 11px; color: #666; line-height: 1.7; margin-bottom: 12px;
  }

  textarea {
    width: 100%; height: 100px; font-size: 11px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    border: 1px solid #ddd; border-radius: 8px;
    padding: 9px 12px; resize: vertical;
    background: #fff; color: #333; line-height: 1.6; display: block;
  }
  textarea:focus { outline: none; border-color: #aaa; }

  .btn-row { display: flex; gap: 7px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
  .btn { padding: 7px 16px; font-size: 12px; font-weight: 600; border-radius: 999px; border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
  .btn:hover { opacity: 0.88; } .btn:active { transform: scale(0.97); }
  .btn-primary { background: #4169e1; color: #fff; }
  .btn-dark    { background: #1a1a2e; color: #fff; }
  .btn-danger  { background: #e03535; color: #fff; }
  .copy-msg { font-size: 11px; color: #4169e1; opacity: 0; transition: opacity 0.3s; }
  .copy-msg.show { opacity: 1; }

  .divider { border: none; border-top: 1px solid #ebebeb; margin: 14px 0; }

  .three-col { display: grid; grid-template-columns: 100px 155px 1fr; gap: 8px; align-items: start; }

  .panel { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
  .panel-title { padding: 5px 9px; font-size: 10px; font-weight: 600; color: #999; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 1px solid #ebebeb; background: #fafafa; }

  .char-btn { display: block; width: 100%; text-align: left; padding: 7px 9px; font-size: 12px; background: transparent; border: none; border-bottom: 1px solid #f0f0f0; color: #333; cursor: pointer; transition: background 0.1s; }
  .char-btn:last-child { border-bottom: none; }
  .char-btn:hover { background: #f5f5f5; }
  .char-btn.active { background: #4169e1; color: #fff; font-weight: 600; }

  .stat-header { padding: 5px 9px; font-size: 11px; font-weight: 600; color: #fff; background: #4169e1; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 9px; border-bottom: 1px solid #f0f0f0; font-size: 11px; }
  .stat-row:last-child { border-bottom: none; }
  .sname { color: #777; }
  .sval { font-weight: 600; color: #4169e1; }
  .muted { font-size: 11px; color: #aaa; padding: 8px 9px; }

  .right-col { display: flex; flex-direction: column; gap: 8px; }

  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); }
  .summary-item { padding: 7px 8px; border-right: 1px solid #f0f0f0; }
  .summary-item:last-child { border-right: none; }
  .slabel { font-size: 10px; color: #999; margin-bottom: 2px; }
  .snum { font-size: 14px; font-weight: 700; color: #333; }
  .snum.green { color: #2e7d32; }
  .snum.blue  { color: #4169e1; }
  .snum.red   { color: #c62828; }

  .roll-log { max-height: 240px; overflow-y: auto; }
  .roll-entry { display: flex; align-items: center; gap: 5px; padding: 5px 9px; border-bottom: 1px solid #f0f0f0; font-size: 11px; }
  .roll-entry:last-child { border-bottom: none; }
  .rskill { color: #666; flex: 1; }
  .rnum { font-weight: 600; color: #333; min-width: 22px; text-align: right; }
  .badge { font-size: 10px; font-weight: 600; padding: 1px 7px; border-radius: 999px; white-space: nowrap; }
  .bg { background: #e8f5e9; color: #2e7d32; }
  .bb { background: #e8eaf6; color: #3949ab; }
  .br { background: #ffebee; color: #c62828; }
  .ba { background: #fff8e1; color: #e65100; }

  .footer { font-size: 10px; color: #bbb; text-align: center; margin-top: 14px; }
  .empty { font-size: 12px; color: #aaa; text-align: center; padding: 1.5rem; grid-column: 1/-1; }
</style>

<div id="app">
  <div class="outer-card">
    <h1>~Roll20 캐릭터들의 주사위 굴림 기록/능력치 정리 도구~</h1>
    <p class="subtitle">등장 캐릭터들의 능력치와 주사위 굴림 기록을 조회할 수 있는 프로그램입니다.</p>
	<p class="subtitle" style="margin-bottom: 2px;">개발자: <a href="https://r-pizzza.tistory.com/" target="_blank">https://r-pizzza.tistory.com/</a></p>
	<p class="subtitle" style="margin-bottom: 0;">가이드: <a href="https://r-pizzza.tistory.com/102" target="_blank">https://r-pizzza.tistory.com/102</a></p><br>
    <div class="guide">
       사용법: Roll20에서 <strong>Ctrl+A, Ctrl+C</strong> (전체복사) → 아래에 <strong>Ctrl+V</strong> (붙여넣기) → <strong>분석하기</strong> 클릭
    </div>
    <textarea id="logInput" placeholder="이 곳에 Roll20 채팅 로그(HTML)를 붙여넣으세요!"></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="parseLog()">분석하기</button>
      <button class="btn btn-dark" onclick="copyResults()">결과 복사</button>
      <button class="btn btn-danger" onclick="resetAll()">다시 하기(비우기)</button>
      <span class="copy-msg" id="copyMsg">복사됐어요!</span>
    </div>
    <hr class="divider">
    <div id="results"><p class="muted" style="text-align:center">정리된 결과가 여기 나옵니다.</p></div>
    <p class="footer">※ 무료 프로그램입니다. 무단복제를 엄금합니다.</p>
  </div>
</div>

<script>
let charOrder = [], charStats = {}, charRolls = {}, allRolls = [], activeChar = null;

function parseLog() {
  const raw = document.getElementById('logInput').value;
  if (!raw.trim()) return;
  const doc = new DOMParser().parseFromString('<div id="root">' + raw + '</div>', 'text/html');
  const messages = doc.getElementById('root').querySelectorAll('.message');
  charOrder = []; charStats = {}; charRolls = {}; allRolls = []; activeChar = null;
  let cur = null;

  messages.forEach(msg => {
    const byEl = msg.querySelector('.by');
    if (byEl) {
      cur = byEl.textContent.replace(':', '').trim();
      if (!charStats[cur]) {
        charOrder.push(cur);
        charStats[cur] = {};
        charRolls[cur] = { total: 0, success: 0, crit: 0, fail: 0, fumble: 0 };
      }
    }
    const caption = msg.querySelector('caption');
    if (!caption || !cur) return;
    const skill = caption.textContent.trim();
    let rolled = null, result = '';
    msg.querySelectorAll('tr').forEach(row => {
      const label = row.querySelector('td[data-i18n]');
      if (!label) return;
      const key = label.getAttribute('data-i18n');
      const spans = row.querySelectorAll('.inlinerollresult');
      if (key === 'value' && spans.length && !charStats[cur][skill]) charStats[cur][skill] = spans[0].textContent.trim();
      if (key === 'rolled' && spans.length) rolled = spans[0].textContent.trim();
      if (key === 'result') { const td = row.querySelector('td.sheet-template_value'); result = td ? td.textContent.trim() : ''; }
    });
    if (rolled !== null) {
      charRolls[cur].total++;
      if (result.includes('대성공')) charRolls[cur].crit++;
      else if (result.includes('대실패')) charRolls[cur].fumble++;
      else if (result.includes('성공')) charRolls[cur].success++;
      else charRolls[cur].fail++;
      allRolls.push({ char: cur, skill, rolled, result });
    }
  });

  if (charOrder.length) activeChar = charOrder[0];
  renderLayout();
}

function pct(n, t) { return t ? Math.round(n / t * 100) : 0; }
function bc(r) {
  if (r.includes('대성공')) return 'bb';
  if (r.includes('대실패')) return 'br';
  if (r.includes('성공')) return 'bg';
  return 'ba';
}

function renderLayout() {
  const el = document.getElementById('results');
  if (!charOrder.length) { el.innerHTML = '<div class="empty">기록을 찾을 수 없어요.</div>'; return; }

  const charListHTML = charOrder.map(c =>
    `<button class="char-btn${c === activeChar ? ' active' : ''}" onclick="selectChar('${c.replace(/'/g,"\\'")}')">  ${c}</button>`
  ).join('');

  const entries = activeChar ? Object.entries(charStats[activeChar]) : [];
  const statBody = entries.length === 0
    ? '<p class="muted">수치 없음</p>'
    : entries.map(([s, v]) => `<div class="stat-row"><span class="sname">${s}</span><span class="sval">${v}</span></div>`).join('');

  const r = activeChar ? charRolls[activeChar] : null;
  const st = r ? r.success + r.crit : 0;
  const summaryHTML = r && r.total > 0
    ? `<div class="summary-grid">
        <div class="summary-item"><p class="slabel">굴림</p><p class="snum">${r.total}회</p></div>
        <div class="summary-item"><p class="slabel">성공률</p><p class="snum green">${pct(st, r.total)}%</p></div>
        <div class="summary-item"><p class="slabel">대성공률</p><p class="snum blue">${pct(r.crit, r.total)}%</p></div>
        <div class="summary-item"><p class="slabel">대실패율</p><p class="snum red">${pct(r.fumble, r.total)}%</p></div>
      </div>`
    : '<p class="muted">굴림 없음</p>';

  const list = activeChar ? allRolls.filter(x => x.char === activeChar) : [];
  const rollLogHTML = list.length === 0
    ? '<p class="muted">굴림 기록 없음</p>'
    : `<div class="roll-log">${list.map(x =>
        `<div class="roll-entry"><span class="rskill">${x.skill}</span><span class="rnum">${x.rolled}</span><span class="badge ${bc(x.result)}">${x.result}</span></div>`
      ).join('')}</div>`;

  el.innerHTML = `<div class="three-col">
    <div class="panel">
      <div class="panel-title">등장인물</div>
      ${charListHTML}
    </div>
    <div class="panel">
      ${activeChar ? `<div class="stat-header">${activeChar}</div>` : ''}
      ${statBody}
    </div>
    <div class="right-col">
      <div class="panel"><div class="panel-title">판정 통계</div>${summaryHTML}</div>
      <div class="panel"><div class="panel-title">굴림 기록</div>${rollLogHTML}</div>
    </div>
  </div>`;
}

function selectChar(name) { activeChar = name; renderLayout(); }

function copyResults() {
  if (!charOrder.length) return;
  const text = charOrder.map(c => {
    const entries = Object.entries(charStats[c]);
    const stats = entries.length ? entries.map(([s, v]) => `  ${s}: ${v}`).join('\n') : '  (수치 없음)';
    return `${c}\n${stats}`;
  }).join('\n\n');
  navigator.clipboard.writeText(text).then(() => {
    const m = document.getElementById('copyMsg');
    m.classList.add('show');
    setTimeout(() => m.classList.remove('show'), 2000);
  });
}

function resetAll() {
  document.getElementById('logInput').value = '';
  document.getElementById('results').innerHTML = '<p class="muted" style="text-align:center">정리된 결과가 여기 나옵니다.</p>';
  charOrder = []; charStats = {}; charRolls = {}; allRolls = []; activeChar = null;
}
</script>
